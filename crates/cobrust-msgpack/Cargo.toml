[package]
name = "cobrust-msgpack"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of msgpack-python 1.0.8 (M6 native-ext scope window). Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
crate-type = ["rlib", "cdylib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3: `--features pyo3` switches in the PyO3 wrapper
# module so the crate is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
serde_json = { workspace = true }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }

[dev-dependencies]
tempfile = "3.10"
