[package]
name = "cobrust-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "Cobrust command-line interface."

[[bin]]
name = "cobrust"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
cobrust-codegen = { path = "../cobrust-codegen" }
cobrust-frontend = { path = "../cobrust-frontend" }
cobrust-hir = { path = "../cobrust-hir" }
cobrust-llm-router = { path = "../cobrust-llm-router" }
cobrust-mir = { path = "../cobrust-mir" }
cobrust-pkg = { path = "../cobrust-pkg" }
cobrust-translator = { path = "../cobrust-translator" }
cobrust-types = { path = "../cobrust-types" }
target-lexicon = "0.13"
thiserror = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
tempfile = "3"
