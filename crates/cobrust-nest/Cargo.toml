[package]
name = "cobrust-nest"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of tomli 2.0.1. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
name = "nest"
# ADR-0072 Q5: `staticlib` produces `libnest.a` for per-import static
# linking by `cobrust build` (second-module generalization off the den
# first proof). `rlib` stays for in-workspace Rust consumers + the
# `cobrust-nest-json` bin + the cabi unit tests. cargo permits both
# side by side.
crate-type = ["rlib", "staticlib"]

[lints]
workspace = true

[features]
default = []
# M5 will gate the real PyO3 native extension behind this feature.
pyo3 = []

[dependencies]
serde_json = { workspace = true }

[[bin]]
name = "cobrust-nest-json"
path = "src/bin/cobrust_nest_json.rs"

[[bench]]
name = "vs_cpython"
harness = false

[dev-dependencies]
# ADR-0072 §4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
