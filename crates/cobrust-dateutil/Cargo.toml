[package]
name = "cobrust-dateutil"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of python-dateutil 2.9.0.post0 (M5 scope window). Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
crate-type = ["rlib", "cdylib"]

[lints]
workspace = true

[features]
default = []
# M6 (per ADR-0011 §3): `--features pyo3` switches on the PyO3 wrapper
# module so the crate is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
serde_json = { workspace = true }
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

[dev-dependencies]
