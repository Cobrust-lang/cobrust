[package]
name = "cobrust-dora"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust ↔ dora-rs robotics dataflow runtime bridge (ADR-0076 Stream Y). Phase 1: SYNTHETIC runtime — proves the C-ABI callback chain end-to-end with a canned 1-event mock. Phase 2 wires the real dora-node-api crate. DO NOT EDIT BY HAND."

[lib]
name = "dora"
# ADR-0076 Phase 1 — ninth ecosystem-module proof. `staticlib` produces
# `libdora.a` for per-import static linking by `cobrust build`. `cdylib`
# stays for the (future) PyO3 native module path (kept symmetric with
# pit / hood / coil even though no `pyo3` feature is wired in Phase 1).
# `rlib` for in-workspace Rust consumers + the cabi unit tests.
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[features]
# DEFAULT is the SYNTHETIC trampoline — light, wasm-buildable, no real
# dora dep (the `cabi::__cobrust_dora_node_run` canned-event path stays
# the default build).
default = []
# `--features dora-real` swaps the L4 runtime shim from the synthetic
# canned-event trampoline to a REAL `dora_node_api::DoraNode` +
# `events.recv()` loop (cobrust-dora #146 Phase A; dora-real-integration
# -plan §9 spike-proven). Mirrors how `coil` gates `faer` behind
# `coil-faer` (ADR-0079 §11) — opt-in + reversible. The C-ABI symbol
# surface + the ecosystem manifest + the codegen callback are UNCHANGED
# (the spike's key insight: this is a `cabi.rs`-local body swap, not a
# compiler change). NOT in `default` — real-dora is native-only (tokio-net
# hard-fails on wasm32 per §9, so the wasm dora story stays synthetic).
dora-real = ["dep:dora-node-api", "dep:tokio"]

[dependencies]
# ADR-0076c (D)-B-1a — the typed-numeric Arrow↔coil.Buffer round-trip
# REUSES `coil::Array` as the `.cb`-visible payload type (one `.cb` array
# type spans the numeric + robotics pillars; ADR-0076c §3). NON-optional:
# BOTH builds need it — the synthetic default returns a canned `coil::Array`
# from `event.data_buffer()` (so the `.cb` type-check + build path resolves
# without a broker), and the `dora-real` build decodes a live Arrow array
# INTO a `coil::Array`. `default-features = false` keeps it lean (no pyo3 /
# faer pull). The boxed `coil::Array` IS the `COIL_BUFFER_ADT` handle, so
# the `.cb` scope drops it via the EXISTING `__cobrust_coil_buffer_drop`
# (ecosystem.rs handle_drop_symbol) — no new drop symbol here.
cobrust-coil = { path = "../cobrust-coil", default-features = false }
# #146 Phase A — the REAL dora-rs node API, behind the OPTIONAL `dora-real`
# feature (NOT default). Exact-pinned per dora-real-integration-plan §3.0
# (F35-sibling version discipline: the crate is independently versioned at
# `0.5.0` as of 2026-06-01, NOT the workspace `0.2.1` the stale ADR cited).
# `default-features = false` is REQUIRED (plan §9 spike): it drops the
# ~40-crate opentelemetry/metrics/tracing telemetry tier AND the macOS
# IOKit/Security framework need, so the lean link requires ONLY
# `-framework CoreFoundation` (see cobrust-cli/src/build.rs). With the
# feature OFF this crate has ZERO real dora deps (the synthetic default).
dora-node-api = { version = "=0.5.0", default-features = false, optional = true }
# #146 Phase A — the dora node event loop enters a multi-thread tokio
# runtime (plan §3.2: the canonical node builds + enters one; a real
# daemon-spawned node's internal monitor tasks call `Handle::current()`).
# OPTIONAL, only pulled by `dora-real` (tokio is already deep in the
# dora-node-api tree, so this adds no NEW transitive weight — it just makes
# the `tokio::runtime::Builder` path nameable from this crate). NOT in the
# synthetic default (which is wasm-buildable; tokio-net is the wasm blocker
# per §9 — but only the `dora-real` path references it).
tokio = { workspace = true, optional = true }

[dev-dependencies]
# ADR-0072 Q5 + ADR-0073 §4: the `cabi` shims declare the
# `__cobrust_str_*` primitives `extern "C"` and bind them from
# `libcobrust_stdlib.a` at the `cobrust build` link step (NO Rust-level
# production dependency). For the in-crate `cabi` unit tests, link
# cobrust-stdlib's rlib as a dev-dependency so those `extern "C"` decls
# resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
