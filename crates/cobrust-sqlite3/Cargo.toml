[package]
name = "cobrust-sqlite3"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of CPython's sqlite3 (PEP 249 DB-API 2.0) surface. Backend bound to rusqlite (bundled libsqlite3). v0.7.0 Stream Z.7.c. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
crate-type = ["rlib", "cdylib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 (mirrored for the ecosystem batch by ADR-0022 §6):
# `--features pyo3` switches in the PyO3 wrapper module so the crate
# is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
# rusqlite with the `bundled` feature compiles libsqlite3 from source,
# so no system libsqlite3 is needed (CI-portable per F40/F44). The
# Cobrust public surface stays sync — Python `sqlite3` is sync and the
# embedded engine has no async story (roadmap §4.1 Z-Q4).
rusqlite = { workspace = true }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }
