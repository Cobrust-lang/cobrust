[package]
name = "cobrust-redis"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
# The Cobrust *wrapper* is dual-licensed Apache-2.0 OR MIT, as every
# workspace crate. The wrapped *dependency* redis-rs is BSD-3-Clause —
# the FIRST non-(Apache/MIT) crate in the wrap-a-crate set (ADR-0078 §5
# R1). The BSD-3 attribution is recorded in `PROVENANCE.toml` +
# `NOTICE`; BSD-3-Clause is permissive + non-copyleft, so it is
# distribution-compatible with the dual workspace license.
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust cache/KV ecosystem module (redis-rebrand). Surface translated; backend bound to redis-rs SYNC path (Client::open -> get_connection -> Commands). ADR-0078 Phase-1c. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
name = "redis"
# ADR-0072 Q5: `staticlib` produces `libredis.a` for per-import static
# linking by `cobrust build` (eleventh-module generalization off the
# den/strike handle-pattern template). `cdylib` stays for the PyO3
# native module; `rlib` for in-workspace Rust consumers + the cabi unit
# tests. cargo permits the three side by side. The produced archive name
# `libredis.a` is what `locate_ecosystem_archive` keys on (mirrors
# strike->libstrike.a).
#
# `[lib] name = "redis"` (the OUTPUT artifact name) is independent of the
# `redis` dependency crate name: inside the crate, `use redis::...`
# resolves to the dependency (the current crate is reached via `crate::`),
# so the two coexist without a rename (verified — cargo distinguishes the
# compiling crate from its deps).
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 (mirrored for the ecosystem batch by ADR-0022 §6):
# `--features pyo3` switches in the PyO3 wrapper module so the crate
# is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
# redis-rs SYNC path only (ADR-0078 §3.5 — the crate ships a blocking
# facade `Client::open(url) -> get_connection() -> Commands`, so NO
# async/tokio is pulled; `default-features = false` drops the default
# acl/streams/geospatial/script/num-bigint extras down to the bare sync
# Client/Connection/Commands surface). `tokio` MUST NOT appear in the
# dep tree — its absence keeps the build light + the wasm32/riscv64
# cross-builds (ADR-0075) green.
#
# Renamed to `redis_rs` (cargo `package = "redis"` rename) so the
# in-crate reference path is unambiguous: with `[lib] name = "redis"`,
# an un-renamed `redis` dep makes rustdoc see two `--extern redis=`
# candidates (our own staticlib + the dep) and fail E0464 on doctests.
# The rename sidesteps that. The version is pinned both here and in the
# workspace `[workspace.dependencies] redis = "1.2"` (cargo does not
# allow combining `workspace = true` with a `package` rename, so the
# version is restated; the workspace pin remains the single source of
# truth the dep audit reads).
redis_rs = { package = "redis", version = "1.2", default-features = false }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }

[dev-dependencies]
# ADR-0072 §4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
