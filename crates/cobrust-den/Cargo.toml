[package]
name = "cobrust-den"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of CPython's sqlite3 (PEP 249 DB-API 2.0) surface. Backend bound to rusqlite (bundled libsqlite3). v0.7.0 Stream Z.7.c. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
name = "den"
# ADR-0072 Q5: `staticlib` produces `libden.a` for per-import static
# linking by `cobrust build`. `cdylib` stays for the PyO3 native module;
# `rlib` for in-workspace Rust consumers + the cabi unit tests. cargo
# permits the three side by side.
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 (mirrored for the ecosystem batch by ADR-0022 §6):
# `--features pyo3` switches in the PyO3 wrapper module so the crate
# is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
# rusqlite with the `bundled` feature compiles libsqlite3 from source,
# so no system libsqlite3 is needed (CI-portable per F40/F44). The
# Cobrust public surface stays sync — Python `sqlite3` is sync and the
# embedded engine has no async story (roadmap §4.1 Z-Q4).
rusqlite = { workspace = true }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }

[dev-dependencies]
# ADR-0072 §4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
