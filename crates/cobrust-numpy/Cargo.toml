[package]
name = "cobrust-numpy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of NumPy 2.0.2 (M7.0 ndarray foundation per ADR-0013 + M7.1..M7.3 + M7.5 random per ADR-0018). Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
crate-type = ["rlib", "cdylib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 + ADR-0013 §"Decision": `--features pyo3` switches in
# the PyO3 wrapper module so the crate is loadable from Python as a
# native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
serde_json = { workspace = true }
ndarray = "0.16"
# M7.5 random backend per ADR-0018 §2: rand 0.8 + rand_pcg 0.3
# (matches numpy's PCG64 algorithm family) + rand_distr 0.4
# (Normal / Uniform distributions). All three crates are
# MIT-OR-Apache-2.0, license-compatible per ADR-0001.
rand = "0.8"
rand_pcg = "0.3"
rand_distr = "0.4"
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }

[dev-dependencies]
tempfile = "3.10"
cobrust-translator = { path = "../cobrust-translator" }
cobrust-llm-router = { path = "../cobrust-llm-router" }
tokio = { workspace = true }
