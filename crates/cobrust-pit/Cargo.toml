[package]
name = "cobrust-pit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of Flask 3.0's sync web-server surface. Backend bound to axum/tokio; the public API stays sync via a block_on bridge. v0.7.0 Stream Z.1.a. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
name = "pit"
# ADR-0073 Q5/§4 — `staticlib` produces `libpit.a` for per-import
# static linking by `cobrust build` (pit is the SIXTH module in the
# proven ecosystem-import chain, first to carry a callback parameter).
# `cdylib` stays for the PyO3 native module; `rlib` for in-workspace
# Rust consumers + the cabi unit tests. cargo permits the three side
# by side.
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 (mirrored for the ecosystem batch by ADR-0022 §6):
# `--features pyo3` switches in the PyO3 wrapper module so the crate
# is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
# axum is the HTTP server substrate; it pulls hyper/tower (already in
# the workspace tree via reqwest's transitive deps). The Cobrust public
# surface stays SYNC — `App::run` bridges to a singleton tokio runtime
# via `Runtime::block_on` (ADR-0028 §A precedent; constitution §2.2 — no
# async/sync coloring at the user layer).
axum = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }

[dev-dependencies]
# In-process HTTP client for the L3 downstream gate — bind on
# 127.0.0.1:0, serve, and round-trip with a real client.
reqwest = { version = "0.12", default-features = false, features = ["json", "blocking", "rustls-tls"] }
# ADR-0073 §4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
