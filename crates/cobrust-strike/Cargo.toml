[package]
name = "cobrust-strike"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust translation of requests 2.31.0 (ecosystem batch). Surface translated; backend bound to reqwest::blocking. Generated by cobrust-translator. DO NOT EDIT BY HAND."

[lib]
name = "strike"
# ADR-0072 Q5: `staticlib` produces `libstrike.a` for per-import static
# linking by `cobrust build` (third-module generalization off the den
# first proof + nest second-module proof). `cdylib` stays for the PyO3
# native module; `rlib` for in-workspace Rust consumers + the cabi unit
# tests. cargo permits the three side by side.
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[features]
default = []
# Per ADR-0011 §3 (mirrored for the ecosystem batch by ADR-0022 §6):
# `--features pyo3` switches in the PyO3 wrapper module so the crate
# is loadable from Python as a native extension.
pyo3 = ["dep:pyo3"]

[dependencies]
serde_json = { workspace = true }
# reqwest::blocking adds the synchronous client surface per ADR-0022 §2.
# The `blocking` feature is opt-in here because the workspace-pinned
# `reqwest` is async-by-default; we don't need the blocking surface
# elsewhere in the workspace yet (M8 brings the structured-concurrency
# runtime, per ADR-0019, after which the public surface here can flip
# to the runtime-driven path without breaking callers).
reqwest = { version = "0.12", default-features = false, features = ["json", "blocking", "rustls-tls"] }
pyo3 = { version = "0.24.2", features = ["extension-module"], optional = true }

[dev-dependencies]
# ADR-0072 §4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
