[package]
name = "cobrust-fang"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license = "Apache-2.0 OR MIT"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cobrust `fang` ecosystem module â€” password hashing / verification over the `argon2` crate (argon2id PHC). ADR-0078 backend Phase 2. DO NOT EDIT BY HAND beyond the cabi surface."

[lib]
name = "fang"
# ADR-0078 backend Phase 2: `staticlib` produces `libfang.a` for
# per-import static linking by `cobrust build` (tenth-module
# generalization off the den first proof + nest/scale value pattern).
# `cdylib` stays for a future PyO3 native module; `rlib` for
# in-workspace Rust consumers + the cabi unit tests. cargo permits the
# three side by side.
crate-type = ["rlib", "cdylib", "staticlib"]

[lints]
workspace = true

[dependencies]
# argon2id password hashing (OWASP-default params via `Argon2::default()`).
# The `password-hash` + `rand` default features supply the PHC
# `SaltString` salt type + the generic `SaltString::generate` RNG path.
argon2 = "0.5"
# argon2's `rand` feature only enables `password-hash/rand_core` (the
# trait), NOT `password-hash/getrandom` (which exports `OsRng`). Depend
# on the shared `password-hash` crate directly with `getrandom` so the
# OS-CSPRNG salt source `SaltString::generate(&mut OsRng)` is available
# (feature unification turns it on for argon2's copy too). Pinned to the
# exact version argon2 0.5 re-exports so no second copy is linked.
password-hash = { version = "0.5", features = ["getrandom"] }
# HS256-signed JSON Web Tokens (the `fang` JWT surface). The
# `jwt_verify` / `jwt_decode` shims PIN the algorithm to HS256 via
# `Validation::new(Algorithm::HS256)` â€” the token's own `alg` header is
# NEVER trusted, so an `alg:none` / alg-swapped (e.g. RS256-header)
# forgery is rejected (the classic JWT algorithm-confusion vuln).
#
# `jsonwebtoken` 10 gates its crypto backend behind a feature: with
# NEITHER `rust_crypto` NOR `aws_lc_rs` enabled, the HMAC `encode` /
# `decode` path PANICS at runtime ("Could not automatically determine
# the process-level CryptoProvider") â€” which, inside an `extern "C"`
# shim, is a non-unwinding ABORT (a NEVER-panic-across-the-C-ABI
# violation). Select `rust_crypto` (pure-Rust hmac + sha2 â€” all HS256
# needs) so the static `libfang.a` links with NO system C crypto
# library. Drop the crate's `use_pem` default: HS256 keys are raw secret
# bytes (`EncodingKey::from_secret`), so PEM parsing (`pem` +
# `simple_asn1`) is dead weight here â€” trimming it shrinks the dep tree.
jsonwebtoken = { version = "10", default-features = false, features = [
    "rust_crypto",
] }
# Claims cross the C-ABI as a JSON object STRING; the shims parse /
# re-serialize via `serde_json::Value` (an arbitrary JSON object, no
# fixed claim schema imposed on `.cb` authors). Workspace-pinned 1.0.
serde_json = { workspace = true }

[dev-dependencies]
# ADR-0072 Â§4 + Q5: the `cabi` shims declare the `__cobrust_str_*`
# primitives `extern "C"` and bind them from `libcobrust_stdlib.a` at
# the `cobrust build` link step (NO Rust-level production dependency).
# For the in-crate `cabi` unit tests, link cobrust-stdlib's rlib as a
# dev-dependency so those `extern "C"` decls resolve under `cargo test`.
cobrust-stdlib = { path = "../cobrust-stdlib" }
