#
# Five-gate CI: fmt + clippy + build + test + doc-coverage
# on macOS arm64 + Linux x86_64.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# When a new push lands on main (or a PR), cancel any in-progress run on the
# same ref. Stops the strike/pit-pong/scale+molt "fix on top of fix" pattern
# where the old run's Post-Run cache-upload step hangs while the new run runs.
# (2026-05-28: we manually `gh run cancel`-d twice this day; this automates it.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
          components: clippy
      # LLVM 18 is required since ADR-0070 §X.3 flipped cobrust-codegen
      # `default = ["llvm"]`; inkwell `llvm18-1` links system LLVM via
      # llvm-sys, which reads LLVM_SYS_181_PREFIX. See ADR-0070 §4.
      - name: Install LLVM 18 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18 || brew upgrade llvm@18 || true
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: cargo build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
      # LLVM 18 required since ADR-0070 §X.3 flip — see clippy job comment.
      - name: Install LLVM 18 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18 || brew upgrade llvm@18 || true
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      # --jobs 2 caps build parallelism: the LLVM-statically-linked test binaries spike peak
      # RAM under the default -j and intermittently OOM-kill the ubuntu runner (finding F72 —
      # the killed-runner flake; --jobs only bounds concurrency, the --all-targets set is unchanged).
      - run: cargo build --workspace --all-targets --locked --jobs 2

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # ubuntu-latest disk-full mitigation (CI 26581236359 + 26584878883 2026-05-28):
      # GH runner ~14GB free isn't enough for LLVM 18 + cargo cache (~1.6GB) +
      # cargo test --workspace artifacts. Reclaim ~30GB by purging unused
      # pre-installed software (haskell/android/dotnet/etc) BEFORE LLVM install.
      - name: Free disk space (ubuntu disk-full mitigation)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
      # LLVM 18 required since ADR-0070 §X.3 flip — see clippy job comment.
      - name: Install LLVM 18 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@18 || brew upgrade llvm@18 || true
          echo "LLVM_SYS_181_PREFIX=$(brew --prefix llvm@18)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      # Probe Python 3 availability for full_pipeline_corpus differential gate.
      # On ubuntu-latest the runner ships python3 but not necessarily python3.11;
      # apt-install provides it. On macos-latest Homebrew's python3 is on PATH.
      # The install step is best-effort (|| true) so CI never fails here.
      - name: Install python3.11 (corpus oracle — Ubuntu only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3.11 python3.11-distutils 2>/dev/null || true
      - name: Verify python3 oracle version (informational)
        run: |
          for py in python3.11 python3 python; do
            if command -v "$py" >/dev/null 2>&1 && "$py" -c "import tomllib" 2>/dev/null; then
              echo "corpus oracle: $py $(${py} --version 2>&1)"
              echo "## corpus oracle" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              echo "| key | value |" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              echo "| --- | --- |" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              echo "| binary | \`$py\` |" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              echo "| version | $($py --version 2>&1) |" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              echo "| os | ${{ matrix.os }} |" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
              break
            fi
          done
      # Eliminate the ecosystem `lib<mod>.a` concurrent-rebuild race at its
      # SOURCE. Each ecosystem e2e's `cobrust build` resolves the staticlib via
      # cli/src/build.rs `locate_ecosystem_archive`: Phase-1 honours a
      # `COBRUST_ECOSYSTEM_ARCHIVE_<MOD>` env override; Phase-2 (the dev
      # fallback) shells out to `cargo build -p cobrust-<mod>`. Run concurrently
      # across the parallel `cargo test` binaries, those Phase-2 cargo
      # invocations RACE — one removes+rewrites lib<mod>.a while a sibling
      # `clang`-links it (`ld: file cannot be open()ed, errno=2`, CI
      # 26709832072; earlier `no such file: libcoil.a` 26693573627/26694248379;
      # sibling libscale.a 26580282088).
      #
      # Pre-building ALONE does NOT close it: `cargo test`'s own compile phase
      # re-fingerprints the staticlib crates, so the first wave of `cobrust
      # build`s still judge them stale and all race to rebuild (proven by
      # 26709832072 recurring AFTER the pre-build landed). The fix is to PRE-
      # BUILD, then STAGE the fresh archives into the Phase-1 env so every
      # `cobrust build` short-circuits to the prebuilt .a and NEVER spawns
      # cargo. `--jobs 2` keeps the F72 anti-OOM ceiling.
      - run: cargo build --workspace --locked --jobs 2
      # Stage every freshly-built ecosystem staticlib into its Phase-1 env
      # override. The vars are read only for actually-imported modules, so
      # over-setting is inert and auto-covers future ecosystem crates (zero
      # per-module maintenance). In-job + same-commit ⇒ no F44 staleness.
      - name: Stage prebuilt ecosystem archives (close cobrust-build race)
        shell: bash
        run: |
          for a in target/debug/lib*.a; do
            [ -e "$a" ] || continue
            mod=$(basename "$a" .a); mod=${mod#lib}
            case "$mod" in *stdlib*) continue;; esac  # stdlib: COBRUST_STDLIB_ARCHIVE
            key="COBRUST_ECOSYSTEM_ARCHIVE_$(printf '%s' "$mod" | tr '[:lower:]' '[:upper:]')"
            echo "$key=$PWD/$a" >> "$GITHUB_ENV"
            echo "staged $key -> $PWD/$a"
          done
      - run: cargo test --workspace --locked
        # Note: per `findings/m9-cross-arch-9ff481c-regression.md`,
        # Linux x86_64 is the gold-standard cross-arch validator;
        # macOS arm64 was the dev host. As of 2026-05-09 both archs
        # pass cargo test --workspace --locked at HEAD 1419d21.
        # full_pipeline_corpus runs when python with tomllib is on PATH;
        # emits cargo:warning= to job summary when it skips.
      - name: Surface full_pipeline_corpus skip-warnings to job summary
        if: always()
        run: |
          if cargo test -p cobrust-tomli --test full_pipeline_corpus -- --nocapture 2>&1 \
               | grep -q "SKIPPED"; then
            echo "### full_pipeline_corpus status" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
            echo ":warning: full_pipeline_corpus SKIPPED on ${{ matrix.os }} — python with tomllib not found" \
              >> "${GITHUB_STEP_SUMMARY:-/dev/null}"
          fi
      - name: Run example binaries (smoke)
        run: |
          cargo run --release -p cobrust-cli -- build examples/hello.cb
          ./target/cobrust/hello | grep -q "hello, world"
          cargo run --release -p cobrust-cli -- build examples/fizzbuzz.cb
          ./target/cobrust/fizzbuzz | head -15 | tail -1 | grep -q "FizzBuzz"
          cargo run --release -p cobrust-cli -- build examples/fib.cb
          ./target/cobrust/fib | tail -1 | grep -q "55"

  doc-coverage:
    name: scripts/doc-coverage.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: bash scripts/doc-coverage.sh

  cli-tempdir-guard:
    name: scripts/cli-tempdir-guard.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: bash scripts/cli-tempdir-guard.sh

  # Tier-2 security P0-3: cargo-audit advisory check.
  # Non-blocking (continue-on-error: true) on initial rollout so that new
  # advisory-DB entries do not break CI without human review. When the team
  # has validated the advisory baseline, remove continue-on-error to harden.
  # See docs/agent/findings/tier2-security-audit-p0.md for rationale (F37).
  security-audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking: see comment above
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # Ignore RUSTSEC-2023-0071 (rsa 0.9 — Marvin timing-sidechannel, NO fixed
        # release upstream): rsa is a transitive dep of jsonwebtoken's REQUIRED
        # rust_crypto backend (cobrust-fang), but fang uses ONLY HS256 / HMAC and
        # NEVER invokes any RSA code path — the advisory is unreachable here.
        # Rationale in crates/cobrust-fang/Cargo.toml. Revisit if rsa ships a fix
        # or fang ever adds an RS*/PS* algorithm (then the path becomes reachable).
        #
        # Ignore RUSTSEC-2024-0436 (paste 1.x — UNMAINTAINED, NOT a vulnerability):
        # `paste` is a build-time proc-macro (token-paste substitution) with NO
        # runtime or security surface; the advisory is "unmaintained" (author
        # archived it), not a defect. Pulled transitively by faer's SIMD crate
        # `pulp`; faer is OPTIONAL (behind the `coil-faer` feature, NOT in the
        # default build — #157 spike), but Cargo.lock lists optional deps so the
        # audit sees it regardless. Revisit if pulp drops paste / adopts a fork.
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0436

  # Code Quality P1: cargo-udeps unused-dependency check.
  # Requires nightly toolchain (uses unstable compiler APIs).
  # Non-blocking initially (continue-on-error: true) per F44 lesson — unused-dep
  # accumulation is a quality regression, not a correctness break; promote to
  # blocking once the baseline is clean. See docs/agent/findings/f44-ci-cache-stale-green-false-pass.md.
  cargo-udeps:
    name: cargo udeps (unused deps)
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking initially — see comment above
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Disk-full mitigation — see `test` job comment. udeps compiles
      # the FULL workspace + needs `cargo install cargo-udeps` overhead.
      - name: Free disk space (ubuntu disk-full mitigation)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@nightly
      # LLVM 18 required since ADR-0070 §X.3 flip — udeps compiles the
      # full workspace (ubuntu-only job). See clippy job comment.
      - name: Install LLVM 18 (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Run cargo udeps
        run: cargo +nightly udeps --workspace --all-targets --backend depinfo

  # ADR-0075 §6 Sprint B — riscv64gc-unknown-linux-gnu cross-build + qemu smoke.
  #
  # Gating policy: option (D) per ADR-0075 §Q3 — runs every push/PR with
  # `continue-on-error: true`. Non-blocking to avoid stalling the LLM
  # write-and-commit loop on a fresh cross surface, while still giving
  # continuous regression signal. Same pattern as the cargo-udeps job
  # (F44 lesson). Promote to blocking once the baseline is clean for 7
  # consecutive days.
  #
  # What it exercises:
  # 1. Installs gcc-riscv64-linux-gnu + qemu-user-static via apt (the test
  #    gate keys on `riscv64-linux-gnu-gcc` + `qemu-riscv64` PATH probes;
  #    cf. `crates/cobrust-cli/tests/cross_compile_riscv64_e2e.rs:89,104`).
  # 2. Adds the `riscv64gc-unknown-linux-gnu` rustup target via the
  #    `targets:` field of `dtolnay/rust-toolchain`.
  # 3. Cross-builds `cobrust-stdlib` for the target (the CLI subprocesses
  #    the same command on first cross use; pre-building short-circuits
  #    that path so the smoke step is fast).
  # 4. Builds the host `cobrust-cli` so the E2E test + smoke step can
  #    invoke the binary at `target/debug/cobrust`.
  # 5. Runs the gated E2E test live (all three skip-gates now satisfied —
  #    rustup target, cross-cc, qemu — so the live branch executes).
  # 6. Smoke: `cobrust build --target=riscv64gc-unknown-linux-gnu
  #    examples/hello.cb` → run under `qemu-riscv64`, grep stdout.
  rv64-cross-smoke:
    name: RV64 cross-build + qemu (ADR-0075 §6 Sprint B)
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — see comment above
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Disk-full mitigation — see `test` job comment. RV cross-build adds
      # `target/riscv64gc-unknown-linux-gnu/` on top of the host target,
      # doubling disk pressure; free disk space FIRST.
      - name: Free disk space (ubuntu disk-full mitigation)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
          targets: riscv64gc-unknown-linux-gnu
      - name: Install LLVM 18 + RV cross-toolchain + qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev \
            gcc-riscv64-linux-gnu qemu-user-static
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
          # F66 — Ubuntu's `qemu-user-static` apt package ships the binary
          # at `/usr/bin/qemu-riscv64-static`; the cross-test probes for
          # plain `qemu-riscv64` (no `-static` suffix). Symlink so the
          # E2E + smoke steps both find it on PATH.
          sudo ln -sf /usr/bin/qemu-riscv64-static /usr/local/bin/qemu-riscv64
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      - name: Cross-build cobrust-stdlib (riscv64gc-unknown-linux-gnu)
        run: cargo build -p cobrust-stdlib --target=riscv64gc-unknown-linux-gnu --locked
      - name: Build host cobrust-cli
        run: cargo build -p cobrust-cli --locked
      - name: cross_compile_riscv64_e2e (live)
        run: cargo test -p cobrust-cli --test cross_compile_riscv64_e2e --locked -- --nocapture
      - name: Smoke — cross-build + qemu-run examples/hello.cb
        run: |
          ./target/debug/cobrust build \
            --target=riscv64gc-unknown-linux-gnu \
            examples/hello.cb -o target/hello-rv64
          file target/hello-rv64
          qemu-riscv64 -L /usr/riscv64-linux-gnu target/hello-rv64 | tee /tmp/rv.out
          grep -q "hello, world" /tmp/rv.out

  # ADR-0075 §6 Sprint E — make the wasm32-wasip1 hello-world path GREEN.
  #
  # Gating policy: option (D) per ADR-0075 §Q3 — runs every push/PR with
  # `continue-on-error: true`. Same shape as rv64-cross-smoke (Sprint B).
  # Non-blocking initially to avoid stalling the LLM write-and-commit
  # loop on a fresh cross surface; promote to blocking after 7 days
  # consecutive clean runs.
  #
  # Sprint D (446016c) wired the build.rs cc/linker plumbing + this CI job,
  # but the first live run failed at the runtime-helper cross-cc step:
  #
  #   /usr/include/stdint.h:26:10: fatal error: 'bits/libc-header-start.h'
  #   file not found
  #
  # Root cause: apt's `clang-18` (`/usr/lib/llvm-18`) with
  # `--target=wasm32-wasip1` but NO wasi-sysroot falls back to host glibc
  # headers (which don't exist for wasm). Sprint D's ADR assumption that
  # "clang bundles the wasi-libc sysroot automatically" holds only for some
  # clang distributions, NOT the apt one. The fix is a real wasi-sysroot.
  #
  # Sprint E installs wasi-sdk-25 (ships a version-matched clang 19 + a
  # wasm32-wasip1 sysroot) and points the cross-cc at the SDK's bundled
  # clang via $COBRUST_CC_WASM32_WASIP1; build.rs additionally appends
  # `--sysroot=$WASI_SDK_PATH/share/wasi-sysroot` (resolve_wasi_sysroot).
  #
  # What it exercises:
  # 1. Installs LLVM 18 (for cobrust-cli's llvm-sys link) + wasmtime-cli
  #    (apt has no recent wasmtime on ubuntu-latest) + wasi-sdk-25 (the
  #    wasm CROSS-cc + sysroot).
  # 2. Adds the `wasm32-wasip1` rustup target.
  # 3. Cross-builds `cobrust-stdlib` for the target with
  #    `--no-default-features` (the default trio doesn't build for wasm; F70).
  # 4. Builds the host `cobrust-cli`.
  # 5. Runs the gated E2E test live (rustup target + cross-cc + sysroot +
  #    wasmtime all present; the live branch executes).
  # 6. Smoke: `cobrust build --target=wasm32-wasip1 examples/hello.cb` →
  #    run under `wasmtime`, grep stdout for "hello, world".
  wasm32-cross-smoke:
    name: WASM32 cross-build + wasmtime (ADR-0075 §6 Sprint E)
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — see comment above
    needs: [build]
    env:
      # wasi-sdk release pin (immutable GitHub release tag). x86_64-linux
      # asset; SHA256 verified in the install step below. Bump deliberately.
      WASI_SDK_VERSION: "25"
      WASI_SDK_FULL: "wasi-sdk-25.0-x86_64-linux"
      # SHA256 of wasi-sdk-25.0-x86_64-linux.tar.gz (114450290 bytes),
      # computed 2026-05-29 (Sprint E). No official SHA256SUMS is published
      # by upstream, so this is pinned from a verified local download.
      WASI_SDK_SHA256: "52640dde13599bf127a95499e61d6d640256119456d1af8897ab6725bcf3d89c"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Disk-full mitigation — see `test` job comment. WASM cross-build
      # adds `target/wasm32-wasip1/` plus a wasmtime install (~80MB) +
      # wasi-sdk (~700MB extracted) on top of the host target; free disk
      # space FIRST.
      - name: Free disk space (ubuntu disk-full mitigation)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
          targets: wasm32-wasip1
      - name: Install LLVM 18 + wasmtime
        run: |
          sudo apt-get update
          # llvm-18 + dev libs are needed for cobrust-cli's own llvm-sys
          # link (LLVM_SYS_181_PREFIX). The wasm CROSS-cc is provided by
          # wasi-sdk's bundled clang (next step), NOT apt clang-18 — apt
          # clang-18 has no wasi-sysroot, which was the Sprint D break.
          sudo apt-get install -y \
            llvm-18 llvm-18-dev libpolly-18-dev libzstd-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> "$GITHUB_ENV"
          # wasmtime: apt has no recent package on ubuntu-latest 24.04;
          # cargo install picks the latest crates.io release (~2-3 min build).
          # `--locked` for reproducibility per workspace policy.
          cargo install wasmtime-cli --locked
      - name: Install wasi-sdk (wasi-libc sysroot + bundled clang)
        # Downloads + checksum-verifies + extracts wasi-sdk-${WASI_SDK_VERSION}.
        # The SDK ships a version-matched clang 19 (resource-dir stdint.h)
        # AND a wasm32-wasip1 sysroot under share/wasi-sysroot. Using the
        # bundled clang (via $COBRUST_CC_WASM32_WASIP1) sidesteps the
        # apt-clang-18-without-sysroot failure entirely. build.rs's
        # resolve_wasi_sysroot reads $WASI_SDK_PATH and derives the sysroot.
        run: |
          set -euo pipefail
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/${WASI_SDK_FULL}.tar.gz"
          echo "Downloading $url"
          curl -fsSL -o /tmp/wasi-sdk.tar.gz "$url"
          echo "${WASI_SDK_SHA256}  /tmp/wasi-sdk.tar.gz" | sha256sum -c -
          sudo mkdir -p /opt
          sudo tar xzf /tmp/wasi-sdk.tar.gz -C /opt
          rm -f /tmp/wasi-sdk.tar.gz
          SDK_PATH="/opt/${WASI_SDK_FULL}"
          test -x "${SDK_PATH}/bin/clang"               # bundled clang present
          test -d "${SDK_PATH}/share/wasi-sysroot"      # sysroot present
          echo "WASI_SDK_PATH=${SDK_PATH}" >> "$GITHUB_ENV"
          echo "COBRUST_WASI_SYSROOT=${SDK_PATH}/share/wasi-sysroot" >> "$GITHUB_ENV"
          # Pin the cross-cc to the SDK's version-matched clang. build.rs
          # takes the $COBRUST_CC_WASM32_WASIP1 path + appends --sysroot.
          echo "COBRUST_CC_WASM32_WASIP1=${SDK_PATH}/bin/clang" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      - name: Cross-build cobrust-stdlib (wasm32-wasip1, --no-default-features)
        # Sprint E scope (hello-world): keep --no-default-features. The
        # default trio (mimalloc-alloc / tokio-runtime / llm-router) pulls
        # mimalloc + mio sockets + threads that wasm32-wasip1 doesn't
        # expose; per-feature wasm32 enablement is deferred (F70). The
        # hello path (print → io::stdout) needs none of them.
        run: cargo build -p cobrust-stdlib --target=wasm32-wasip1 --no-default-features --locked
      - name: Build host cobrust-cli
        run: cargo build -p cobrust-cli --locked
      - name: cross_compile_wasm32_e2e (live)
        run: cargo test -p cobrust-cli --test cross_compile_wasm32_e2e --locked -- --nocapture
      - name: Smoke — cross-build + wasmtime-run examples/hello.cb
        run: |
          ./target/debug/cobrust build \
            --target=wasm32-wasip1 \
            examples/hello.cb -o target/hello.wasm
          file target/hello.wasm
          wasmtime run target/hello.wasm | tee /tmp/wasm.out
          grep -q "hello, world" /tmp/wasm.out

  # Optional: real-LLM smoke (gated by step-level env check;
  # job-level `if: ${{ secrets.X != '' }}` is rejected by GitHub Actions
  # validation — secrets context is restricted to env/with/run.)
  real-llm-smoke:
    name: real-LLM smoke (gated)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2  # v2.7.8
      - env:
          USER_CODEX_API_KEY: ${{ secrets.USER_CODEX_API_KEY }}
        run: |
          if [ -z "$USER_CODEX_API_KEY" ]; then
            echo "::warning::USER_CODEX_API_KEY not set — skipping real-LLM smoke"
            exit 0
          fi
          cargo test --locked -p cobrust-llm-router \
            --test real_llm_smoke -- --nocapture
