# .github/workflows/release.yml
#
# On git tag v* — build release binaries for all tier-1 targets and
# upload them to a GitHub Release as tar.gz archives.
#
# File naming convention: cobrust-v{version}-{target_triple}-{cpu_level}.tar.gz
# Binary inside archive: cobrust  (or cobrust.exe on Windows)
#
# ADR-0046 tier-1 platform contract (must build, must appear in release notes):
#   - aarch64-apple-darwin           macOS arm64 (Apple Silicon)
#   - aarch64-unknown-linux-gnu      Linux arm64 (cross-compiled via `cross`)
#   - x86_64-unknown-linux-gnu       Linux x86_64 (glibc dynamic)
#   - x86_64-unknown-linux-musl      Linux x86_64 STATIC (musl libc, no glibc)
#                                    Promoted: Phase K Strand #5 (2026-05-19, ADR-0046 §Amendment)
#                                    Runs on Alpine, distroless, minimal containers
#
# ADR-0065 Tier 3 CPU-level matrix (Phase O wave-1): 9 wheel variants per tag
#   x86_64-unknown-linux-gnu:   v1 (baseline) | v3 (haswell / AVX2+FMA) | v4 (skylake-avx512)
#   x86_64-unknown-linux-musl:  v1 (static baseline) | v3 (static AVX2)
#   aarch64-unknown-linux-gnu:  neon (all ARMv8-A) | sve (Graviton3 / Altra, experimental)
#   aarch64-apple-darwin:       m1 (Apple M1/M2 base) | m2 (Apple M2 Pro+ / M3+)
#
# Tier-2 (best-effort, may fail without blocking release): (none currently)
# Queued (documented as cargo install --git path, not built):
#   - x86_64-apple-darwin            macOS x86_64 Intel
#   - x86_64-pc-windows-msvc         Windows x86_64 MSVC — DEFERRED to ADR-0058b followup
#                                    (Gate 8 audit ae2316f1c51dbd6be: musl > MSVC priority)

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -------------------------------------------------------------------------
  # Build tier-1 targets — ADR-0065 Tier 3 CPU-level matrix (Phase O wave-1)
  # 9 wheel variants: each matrix entry has cpu_level + rustflags_extra.
  # asset_suffix drives the archive name per ADR-0065 §3.2 naming convention.
  # -------------------------------------------------------------------------
  build-tier1:
    name: Build ${{ matrix.target }} [${{ matrix.cpu_level }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # ---- x86_64-unknown-linux-gnu: v1 / v3 / v4 ----------------------
          # v1: baseline, runs on all x86-64 hardware (ADR-0046 existing triple)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            install_musl_tools: false
            cpu_level: v1
            rustflags_extra: "-C target-cpu=x86-64"
            asset_suffix: x86_64-unknown-linux-gnu-v1
          # v3: Haswell+; AVX2 + FMA (ADR-0065 §3.1)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            install_musl_tools: false
            cpu_level: v3
            rustflags_extra: "-C target-cpu=haswell"
            asset_suffix: x86_64-unknown-linux-gnu-v3
          # v4: Skylake-AVX512; data-centre / HPC (ADR-0065 §3.1)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            install_musl_tools: false
            cpu_level: v4
            rustflags_extra: "-C target-cpu=skylake-avx512"
            asset_suffix: x86_64-unknown-linux-gnu-v4
          # ---- x86_64-unknown-linux-musl: v1 / v3 --------------------------
          # v1: static baseline, Alpine / distroless / minimal containers
          # ADR-0046 §Amendment: promoted to tier-1 Phase K Strand #5 (2026-05-19)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            install_musl_tools: true
            cpu_level: v1
            rustflags_extra: "-C target-cpu=x86-64"
            asset_suffix: x86_64-unknown-linux-musl-v1
          # v3: static AVX2 musl (ADR-0065 §3.1)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
            install_musl_tools: true
            cpu_level: v3
            rustflags_extra: "-C target-cpu=haswell"
            asset_suffix: x86_64-unknown-linux-musl-v3
          # ---- aarch64-unknown-linux-gnu: neon / sve ------------------------
          # neon: mandatory ARMv8-A NEON; all AArch64 Linux (cross-compiled)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            install_musl_tools: false
            cpu_level: neon
            rustflags_extra: ""
            asset_suffix: aarch64-unknown-linux-gnu-neon
          # sve: Neoverse-V1 (Graviton3 / Ampere Altra); experimental per ADR-0065 §6.5
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            install_musl_tools: false
            cpu_level: sve
            rustflags_extra: "-C target-cpu=neoverse-v1"
            asset_suffix: aarch64-unknown-linux-gnu-sve
          # ---- aarch64-apple-darwin: m1 / m2 --------------------------------
          # m1: Apple M1 / M2 base (ADR-0065 §3.1)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            install_musl_tools: false
            cpu_level: m1
            rustflags_extra: "-C target-cpu=apple-m1"
            asset_suffix: aarch64-apple-darwin-m1
          # m2: Apple M2 Pro+ / M3+ (ADR-0065 §3.1)
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            install_musl_tools: false
            cpu_level: m2
            rustflags_extra: "-C target-cpu=apple-m2"
            asset_suffix: aarch64-apple-darwin-m2

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: dtolnay/rust-toolchain@stable  # stable 2025-01
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2  # v2.7.8
        with:
          key: ${{ matrix.target }}-${{ matrix.cpu_level }}

      - name: Install musl-tools (Linux musl static build)
        if: matrix.install_musl_tools
        run: sudo apt-get update -qq && sudo apt-get install -y musl-tools

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary (cross)
        if: matrix.use_cross
        env:
          RUSTFLAGS: "-D warnings ${{ matrix.rustflags_extra }}"
        run: |
          cross build --release --locked -p cobrust-cli --target ${{ matrix.target }}

      - name: Build release binary (native)
        if: ${{ !matrix.use_cross }}
        env:
          RUSTFLAGS: "-D warnings ${{ matrix.rustflags_extra }}"
        run: |
          cargo build --release --locked -p cobrust-cli --target ${{ matrix.target }}

      - name: Package tar.gz
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # ADR-0065 §3.2 naming: cobrust-<version>-<triple>-<cpu_level>.tar.gz
          ARCHIVE="cobrust-v${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
          BINARY="target/${{ matrix.target }}/release/cobrust"
          tar czf "${ARCHIVE}" -C "$(dirname ${BINARY})" "$(basename ${BINARY})"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: cobrust-${{ matrix.asset_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  # -------------------------------------------------------------------------
  # Build best-effort targets (non-blocking)
  # NOTE: x86_64-pc-windows-msvc removed from this matrix in Phase K Strand #5.
  # Windows MSVC is now classified as "queued" pending ADR-0058b (stable runner
  # + test-suite parity + packaging convention decision).
  # This job skeleton is retained for future tier-2 additions.
  # -------------------------------------------------------------------------
  build-best-effort:
    name: Build ${{ matrix.target }} (best-effort)
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    if: ${{ false }}  # no tier-2 targets currently; remove this guard when next tier-2 lands
    strategy:
      fail-fast: false
      matrix:
        include: []

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Placeholder
        run: echo "No best-effort targets configured"

  # -------------------------------------------------------------------------
  # Create GitHub Release and upload all artifacts
  # -------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-tier1]
    # Run after best-effort too when available; but don't gate on it.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4  # v4.1.8
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2  # v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Cobrust ${{ github.ref_name }}"
          body: |
            ## Installation

            ### Option A — cargo install (requires Rust toolchain)

            ```bash
            cargo install --git https://github.com/Cobrust-lang/cobrust cobrust-cli
            # (crates.io publish queued for v0.2.0)
            ```

            ### Option B — prebuilt binary (no Rust needed)

            ```bash
            # macOS arm64 (tier-1)
            curl -L https://github.com/Cobrust-lang/cobrust/releases/download/${{ github.ref_name }}/cobrust-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv cobrust /usr/local/bin/

            # Linux arm64 (tier-1)
            curl -L https://github.com/Cobrust-lang/cobrust/releases/download/${{ github.ref_name }}/cobrust-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv cobrust /usr/local/bin/

            # Linux x86_64 — glibc (tier-1)
            curl -L https://github.com/Cobrust-lang/cobrust/releases/download/${{ github.ref_name }}/cobrust-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv cobrust /usr/local/bin/

            # Linux x86_64 — static musl (tier-1, Alpine / distroless / minimal containers)
            curl -L https://github.com/Cobrust-lang/cobrust/releases/download/${{ github.ref_name }}/cobrust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz | tar xz
            sudo mv cobrust /usr/local/bin/
            ```

            ### Option C — Alpine / distroless container (musl static binary)

            ```dockerfile
            FROM alpine:latest
            RUN apk add --no-cache curl tar
            RUN curl -L https://github.com/Cobrust-lang/cobrust/releases/download/${{ github.ref_name }}/cobrust-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin/
            ```

            ### Quick start

            ```bash
            cobrust new hello && cd hello && cobrust run src/main.cb
            # → hello, world
            ```

            See [Getting Started](https://github.com/Cobrust-lang/cobrust/blob/main/docs/human/en/getting-started.md) for the full guide.
          files: dist/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
