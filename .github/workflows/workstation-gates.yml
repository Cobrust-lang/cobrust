name: Workstation Gates

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test
        required: true
        default: feature/alpha-ai-native

permissions:
  contents: read

concurrency:
  group: workstation-gates-${{ github.event.inputs.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  PATH: /home/<runner-user>/.cargo/bin:/home/<runner-user>/mambaforge/bin:/home/<runner-user>/miniforge3/bin:/home/<runner-user>/miniconda3/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin

jobs:
  gates:
    name: <self-hosted-runner> heavy gates
    runs-on: [self-hosted, dg-workstation, cobrust-heavy, linux, x64]
    timeout-minutes: 180
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Show runner resources
        run: |
          set -euo pipefail
          uname -a
          nproc
          free -h || true
          df -h /tmp
          command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi || true
          command -v mamba >/dev/null 2>&1 && mamba --version || true
          rustc --version
          cargo --version

      - name: Check Cobrust temp dirs before gates
        run: |
          set -euo pipefail
          count=$(find /tmp -xdev -maxdepth 1 -type d -name 'cobrust-*' -user "$(id -un)" | wc -l)
          echo "cobrust_tmp_dirs_before=${count}"
          du -sch /tmp/cobrust-* 2>/dev/null | tail -1 || true

      - name: CLI tempdir leak guard
        run: bash scripts/cli-tempdir-guard.sh

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: cargo test with paired gate
        run: |
          set +e
          LOG="${RUNNER_TEMP}/cobrust-workspace-test.log"
          cargo test --workspace --locked --no-fail-fast >"${LOG}" 2>&1
          EXIT=$?
          FAILED=$(grep -c '^test result: FAILED' "${LOG}" || true)
          cat "${LOG}"
          echo "cargo_test_exit=${EXIT}"
          echo "failed_grep=${FAILED}"
          if [ "${EXIT}" -ne 0 ]; then
            exit "${EXIT}"
          fi
          if [ "${FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: doc coverage
        run: bash scripts/doc-coverage.sh

      - name: Clean Cobrust temp dirs after gates
        if: always()
        run: |
          set -euo pipefail
          count=$(find /tmp -xdev -maxdepth 1 -type d -name 'cobrust-*' -user "$(id -un)" | wc -l)
          echo "cobrust_tmp_dirs_before_cleanup=${count}"
          find /tmp -xdev -maxdepth 1 -type d -name 'cobrust-*' -user "$(id -un)" -prune -exec rm -rf -- {} +
          df -h /tmp
