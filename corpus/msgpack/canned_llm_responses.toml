/// Pack any signed integer. Mirrors `msgpack_core.pack_int`. The
/// non-negative path delegates to `pack_uint`; the negative path picks
/// the smallest fitting negative-fixint / int8 / int16 / int32 / int64
/// marker.
pub fn pack_int(value: i64, out: &mut Vec<u8>) {
    if value >= 0 {
        return pack_uint(value as u64, out);
    }
    if value >= -0x20 {
        out.push(0xe0 | ((value as i32 & 0x1f) as u8));
    } else if value >= -0x80 {
        out.push(INT_8);
        out.push((value as i8) as u8);
    } else if value >= -0x8000 {
        let v = value as i16;
        out.push(INT_16);
        out.push(((v >> 8) & 0xff) as u8);
        out.push((v & 0xff) as u8);
    } else if value >= -0x8000_0000 {
        let v = value as i32;
        out.push(INT_32);
        out.push(((v >> 24) & 0xff) as u8);
        out.push(((v >> 16) & 0xff) as u8);
        out.push(((v >> 8) & 0xff) as u8);
        out.push((v & 0xff) as u8);
    } else {
        out.push(INT_64);
        out.extend_from_slice(&value.to_be_bytes());
    }
}
'''

