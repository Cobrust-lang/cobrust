use std::fmt;

/// Heterogeneous value tree the M6 msgpack scope handles. Mirrors the
/// Python value categories that `pack` dispatches on (nil/bool/int/
/// float/str/bytes/array/map). The L0 differential gate compares
/// `to_json()` between this representation and the CPython oracle.
#[derive(Clone, Debug, PartialEq)]
pub enum MsgValue {
    Nil,
    Bool(bool),
    Int(i64),
    UInt(u64),
    Float(f64),
    Str(String),
    Bin(Vec<u8>),
    Array(Vec<MsgValue>),
    Map(Vec<(String, MsgValue)>),
}

impl MsgValue {
    /// Convert to a serde_json::Value for the L3 differential gate.
    /// `bin` becomes a JSON array of byte values; `map` keys are
    /// stringified; the rest is straightforward.
    #[must_use]
    pub fn to_json(&self) -> serde_json::Value {
        match self {
            MsgValue::Nil => serde_json::Value::Null,
            MsgValue::Bool(b) => serde_json::Value::Bool(*b),
            MsgValue::Int(i) => serde_json::json!(*i),
            MsgValue::UInt(u) => serde_json::json!(*u),
            MsgValue::Float(f) => serde_json::json!(*f),
            MsgValue::Str(s) => serde_json::Value::String(s.clone()),
            MsgValue::Bin(b) => serde_json::json!(b),
            MsgValue::Array(items) => {
                serde_json::Value::Array(items.iter().map(MsgValue::to_json).collect())
            }
            MsgValue::Map(items) => {
                let mut m = serde_json::Map::new();
                for (k, v) in items {
                    m.insert(k.clone(), v.to_json());
                }
                serde_json::Value::Object(m)
            }
        }
    }
}

/// Single error type for msgpack pack/unpack failures. Mirrors
/// the union of `PackException` and `UnpackException` from the
/// Python form — they're collapsed into one Rust enum because Rust
/// `Result<T, E>` is the default error path (constitution §2.2).
#[derive(Clone, Debug)]
pub struct MsgError {
    pub kind: MsgErrorKind,
    pub message: String,
}

#[derive(Clone, Copy, Debug, PartialEq, Eq)]
pub enum MsgErrorKind {
    Pack,
    Unpack,
}

impl fmt::Display for MsgError {
    fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
        let kind = match self.kind {
            MsgErrorKind::Pack => "pack",
            MsgErrorKind::Unpack => "unpack",
        };
        write!(f, "msgpack {kind} error: {}", self.message)
    }
}

impl std::error::Error for MsgError {}

impl MsgError {
    pub(crate) fn pack(message: impl Into<String>) -> Self {
        Self { kind: MsgErrorKind::Pack, message: message.into() }
    }

    pub(crate) fn unpack(message: impl Into<String>) -> Self {
        Self { kind: MsgErrorKind::Unpack, message: message.into() }
    }
}

// msgpack format prefix bytes — verbatim from the spec.
pub(crate) const NIL: u8 = 0xc0;
pub(crate) const FALSE: u8 = 0xc2;
pub(crate) const TRUE: u8 = 0xc3;
pub(crate) const BIN_8: u8 = 0xc4;
pub(crate) const BIN_16: u8 = 0xc5;
pub(crate) const BIN_32: u8 = 0xc6;
pub(crate) const FLOAT_64: u8 = 0xcb;
pub(crate) const UINT_8: u8 = 0xcc;
pub(crate) const UINT_16: u8 = 0xcd;
pub(crate) const UINT_32: u8 = 0xce;
pub(crate) const UINT_64: u8 = 0xcf;
pub(crate) const INT_8: u8 = 0xd0;
pub(crate) const INT_16: u8 = 0xd1;
pub(crate) const INT_32: u8 = 0xd2;
pub(crate) const INT_64: u8 = 0xd3;
pub(crate) const STR_8: u8 = 0xd9;
pub(crate) const STR_16: u8 = 0xda;
pub(crate) const STR_32: u8 = 0xdb;
pub(crate) const ARRAY_16: u8 = 0xdc;
pub(crate) const ARRAY_32: u8 = 0xdd;
pub(crate) const MAP_16: u8 = 0xde;
pub(crate) const MAP_32: u8 = 0xdf;

pub(crate) const FIXMAP_PREFIX: u8 = 0x80;
pub(crate) const FIXARRAY_PREFIX: u8 = 0x90;
pub(crate) const FIXSTR_PREFIX: u8 = 0xa0;

/// Top-level pack: dispatch on `MsgValue` variant and write the
/// msgpack byte sequence into `out`. Mirrors `msgpack_core.pack`.
///
/// # Errors
/// Returns [`MsgError::pack`] for unsupported value shapes (M6 scope).
pub fn pack(value: &MsgValue, out: &mut Vec<u8>) -> Result<(), MsgError> {
    match value {
        MsgValue::Nil => out.push(NIL),
        MsgValue::Bool(true) => out.push(TRUE),
        MsgValue::Bool(false) => out.push(FALSE),
        MsgValue::Int(i) => pack_int(*i, out),
        MsgValue::UInt(u) => pack_uint(*u, out),
        MsgValue::Float(f) => pack_float(*f, out),
        MsgValue::Str(s) => pack_str(s, out),
        MsgValue::Bin(b) => pack_bin(b, out),
        MsgValue::Array(items) => pack_array(items, out)?,
        MsgValue::Map(items) => pack_map(items, out)?,
    }
    Ok(())
}

/// Convenience: pack into a fresh Vec and return owned bytes.
///
/// # Errors
/// See [`pack`].
pub fn pack_to_vec(value: &MsgValue) -> Result<Vec<u8>, MsgError> {
    let mut out = Vec::new();
    pack(value, &mut out)?;
    Ok(out)
}
