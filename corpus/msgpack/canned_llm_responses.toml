/// Pack a list/tuple as msgpack array. Mirrors `msgpack_core.pack_array`.
///
/// # Errors
/// Returns [`MsgError::pack`] when one of the elements falls outside the M6 scope.
pub fn pack_array(items: &[MsgValue], out: &mut Vec<u8>) -> Result<(), MsgError> {
    let n = items.len();
    if n <= 0x0f {
        out.push(FIXARRAY_PREFIX | (n as u8));
    } else if n <= 0xffff {
        out.push(ARRAY_16);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    } else if n <= 0xffff_ffff {
        out.push(ARRAY_32);
        out.push(((n >> 24) & 0xff) as u8);
        out.push(((n >> 16) & 0xff) as u8);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    } else {
        return Err(MsgError::pack("array length exceeds u32"));
    }
    for elem in items {
        pack(elem, out)?;
    }
    Ok(())
}
'''

