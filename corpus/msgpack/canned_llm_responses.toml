/// Pack a dict (str keys only at M6) with sorted-key iteration so
/// emission is deterministic. Mirrors `msgpack_core.pack_map`.
///
/// # Errors
/// Returns [`MsgError::pack`] when a value falls outside the M6 scope.
pub fn pack_map(items: &[(String, MsgValue)], out: &mut Vec<u8>) -> Result<(), MsgError> {
    let n = items.len();
    if n <= 0x0f {
        out.push(FIXMAP_PREFIX | (n as u8));
    } else if n <= 0xffff {
        out.push(MAP_16);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    } else if n <= 0xffff_ffff {
        out.push(MAP_32);
        out.push(((n >> 24) & 0xff) as u8);
        out.push(((n >> 16) & 0xff) as u8);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    } else {
        return Err(MsgError::pack("map length exceeds u32"));
    }
    let mut sorted: Vec<&(String, MsgValue)> = items.iter().collect();
    sorted.sort_by(|a, b| a.0.cmp(&b.0));
    for (k, v) in sorted {
        pack_str(k, out);
        pack(v, out)?;
    }
    Ok(())
}
'''

