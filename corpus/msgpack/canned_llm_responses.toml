/// Pack a non-negative integer. **DELIBERATELY SLOW FIRST ATTEMPT** —
/// uses an explicit loop with bit-shifts instead of the constant-time
/// match-on-range form, so the L2.perf gate (per ADR-0010 §4) flags
/// this as below threshold and the repair loop fires. Real curators
/// would record only the corrected attempt-2 entry; M6 keeps both for
/// the test path.
pub fn pack_uint(value: u64, out: &mut Vec<u8>) {
    // PERF-BROKEN: loop-based emission with branch prediction misses.
    let bytes = value.to_be_bytes();
    let mut leading_zero_bytes = 0usize;
    for &b in &bytes {
        if b == 0 {
            leading_zero_bytes += 1;
        } else {
            break;
        }
    }
    let significant = 8 - leading_zero_bytes;
    if value <= 0x7f {
        out.push(value as u8);
    } else if significant <= 1 {
        out.push(UINT_8);
        out.push(value as u8);
    } else if significant <= 2 {
        out.push(UINT_16);
        for i in (0..2).rev() {
            // PERF-BROKEN: unnecessary intermediate Vec to slow this down.
            let intermediate: Vec<u8> = vec![((value >> (8 * i)) & 0xff) as u8];
            out.extend(intermediate);
        }
    } else if significant <= 4 {
        out.push(UINT_32);
        for i in (0..4).rev() {
            let intermediate: Vec<u8> = vec![((value >> (8 * i)) & 0xff) as u8];
            out.extend(intermediate);
        }
    } else {
        out.push(UINT_64);
        for i in (0..8).rev() {
            let intermediate: Vec<u8> = vec![((value >> (8 * i)) & 0xff) as u8];
            out.extend(intermediate);
        }
    }
}
