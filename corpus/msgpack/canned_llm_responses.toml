/// Read `length` msgpack values into a Vec. Mirrors `msgpack_core.unpack_array`.
///
/// # Errors
/// Returns [`MsgError::unpack`] if any element is malformed.
pub fn unpack_array(data: &[u8], pos: usize, length: usize) -> Result<(Vec<MsgValue>, usize), MsgError> {
    let mut out: Vec<MsgValue> = Vec::with_capacity(length);
    let mut cursor = pos;
    for _ in 0..length {
        let (v, next) = unpack_one(data, cursor)?;
        out.push(v);
        cursor = next;
    }
    Ok((out, cursor))
}
'''

