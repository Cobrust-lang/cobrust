response_text = '''
/// Dispatch one msgpack value starting at `pos`. Returns
/// `(value, new_pos)`. Mirrors `msgpack_core._unpack_one`.
///
/// # Errors
/// Returns [`MsgError::unpack`] for malformed bytes or unknown markers.
#[allow(clippy::too_many_lines)]
pub fn unpack_one(data: &[u8], pos: usize) -> Result<(MsgValue, usize), MsgError> {
    if pos >= data.len() {
        return Err(MsgError::unpack("EOF before value"));
    }
    let marker = data[pos];
    if marker <= 0x7f {
        return Ok((MsgValue::UInt(u64::from(marker)), pos + 1));
    }
    if marker >= 0xe0 {
        let v: i32 = i32::from(marker) - 0x100;
        return Ok((MsgValue::Int(i64::from(v)), pos + 1));
    }
    match marker {
        NIL => Ok((MsgValue::Nil, pos + 1)),
        TRUE => Ok((MsgValue::Bool(true), pos + 1)),
        FALSE => Ok((MsgValue::Bool(false), pos + 1)),
        UINT_8 => {
            let (v, p) = unpack_uint(data, pos + 1, 1)?;
            Ok((MsgValue::UInt(v), p))
