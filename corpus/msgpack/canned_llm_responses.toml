/// Pack Python bytes as msgpack bin. Mirrors `msgpack_core.pack_bin`.
pub fn pack_bin(value: &[u8], out: &mut Vec<u8>) {
    let n = value.len();
    if n <= 0xff {
        out.push(BIN_8);
        out.push(n as u8);
    } else if n <= 0xffff {
        out.push(BIN_16);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    } else {
        out.push(BIN_32);
        out.push(((n >> 24) & 0xff) as u8);
        out.push(((n >> 16) & 0xff) as u8);
        out.push(((n >> 8) & 0xff) as u8);
        out.push((n & 0xff) as u8);
    }
    out.extend_from_slice(value);
}
