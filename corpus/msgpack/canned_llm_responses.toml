response_text = '''
/// Read n_bytes of big-endian signed int. Mirrors `msgpack_core.unpack_int`.
///
/// # Errors
/// Returns [`MsgError::unpack`] when the slice is truncated or
/// `n_bytes` is outside the supported range (1, 2, 4, 8).
pub fn unpack_int(data: &[u8], pos: usize, n_bytes: usize) -> Result<(i64, usize), MsgError> {
    let (raw, new_pos) = unpack_uint(data, pos, n_bytes)?;
    // n_bytes is always 1, 2, 4, or 8 from the dispatch table; the
    // 8-byte form is special because `1i64 << 64` overflows so we
    // reinterpret the bit pattern directly.
    let value: i64 = match n_bytes {
        1 | 2 | 4 => {
            let bits = 8 * n_bytes;
            let sign_bit: u64 = 1u64 << (bits - 1);
            if raw & sign_bit != 0 {
                (raw as i64) - (1i64 << bits)
            } else {
                raw as i64
            }
        }
        8 => raw as i64,
        _ => return Err(MsgError::unpack(format!(
            "unpack_int: n_bytes must be 1/2/4/8, got {n_bytes}"
        ))),
    };
    Ok((value, new_pos))
}
'''

