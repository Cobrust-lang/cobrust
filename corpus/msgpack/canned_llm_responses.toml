/// Read `length` (key, value) pairs into a Vec of pairs. Mirrors
/// `msgpack_core.unpack_map`. We use a Vec-of-pairs (not a HashMap) so
/// the M6 differential gate can verify key ordering deterministically.
///
/// # Errors
/// Returns [`MsgError::unpack`] when keys are non-strings or values are
/// malformed.
pub fn unpack_map(
    data: &[u8],
    pos: usize,
    length: usize,
) -> Result<(Vec<(String, MsgValue)>, usize), MsgError> {
    let mut out: Vec<(String, MsgValue)> = Vec::with_capacity(length);
    let mut cursor = pos;
    for _ in 0..length {
        let (k, p2) = unpack_one(data, cursor)?;
        let key = match k {
            MsgValue::Str(s) => s,
            _ => return Err(MsgError::unpack("M6 only supports str keys")),
        };
        let (v, p3) = unpack_one(data, p2)?;
        out.push((key, v));
        cursor = p3;
    }
    Ok((out, cursor))
}
'''

