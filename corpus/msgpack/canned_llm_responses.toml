/// Top-level unpack: parse `data` as one msgpack value. Mirrors
/// `msgpack_core.unpack`.
///
/// # Errors
/// Returns [`MsgError::unpack`] for malformed input or trailing bytes.
pub fn unpack(data: &[u8]) -> Result<MsgValue, MsgError> {
    let (value, pos) = unpack_one(data, 0)?;
    if pos != data.len() {
        return Err(MsgError::unpack("trailing bytes after value"));
    }
    Ok(value)
}
