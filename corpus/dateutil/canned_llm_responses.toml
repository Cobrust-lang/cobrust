# Canned LLM responses for dateutil M5 — synthetic-LLM mode.
#
# Schema per ADR-0007 §"Synthetic-LLM mode contract" + ADR-0008
# §"Synthetic provider header — version 1.1" (adds optional `attempt`).
# Lookup key: (task, function, attempt). When `attempt` is omitted on
# either side, both default to 1 — backwards compatible with M4's
# tomli table.
#
# The pipeline concatenates entries alphabetically by function name
# into `crates/cobrust-dateutil/src/parser.rs`. The first alphabetic
# entry (`days_in_month`) carries the module preamble (use statements
# + ParserError + datetime tuple type alias + helper imports).
#
# Source-SHA staleness check:
#   sha256(corpus/dateutil/upstream/dateutil_core.py)[..16] = "187586aad2a69e52"
#
# REPAIR-LOOP DEMO (per ADR-0008 §5):
#   `parse_iso` ships TWO entries:
#     - attempt = 1 → deliberately broken (returns wrong tuple shape)
#     - attempt = 2 → correct
#   The L2.behavior gate fails on attempt 1, repair loop ships
#   diagnostic blob to L1, attempt 2 is served, gate passes. The
#   integration test at
#   `crates/cobrust-dateutil/tests/dateutil_pipeline.rs::repair_loop_recovers`
#   asserts retry count > 0 and < escalation_threshold.

schema_version = 1
oracle_runtime = "cpython 3.11"

# ---- days_in_month (alphabetic-first; carries module preamble) -------------

[[entry]]
task = "translate"
