/// Gregorian leap-year predicate. Mirrors `relativedelta_core._is_leap_year`.
#[must_use]
pub fn is_leap_year(year: i32) -> bool {
    if year % 4 != 0 {
        return false;
    }
    if year % 100 != 0 {
        return true;
    }
    year % 400 == 0
}
'''

# ---- normalize_datetime -----------------------------------------------------

[[entry]]
task = "translate"
function = "normalize_datetime"
source_sha16 = "187586aad2a69e52"
response_text = '''
/// Cascade overflow / underflow upward through datetime fields until
/// each is in range. Mirrors `relativedelta_core._normalize`.
#[must_use]
pub fn normalize_datetime(
    mut year: i32,
    mut month: i32,
    mut day: i32,
    mut hour: i32,
    mut minute: i32,
    mut second: i32,
) -> (i32, i32, i32, i32, i32, i32) {
    while second < 0 {
        minute -= 1;
        second += 60;
    }
    while second >= 60 {
        minute += 1;
        second -= 60;
    }
    while minute < 0 {
        hour -= 1;
        minute += 60;
    }
    while minute >= 60 {
        hour += 1;
        minute -= 60;
    }
    while hour < 0 {
        day -= 1;
        hour += 24;
    }
    while hour >= 24 {
        day += 1;
        hour -= 24;
    }
    while month < 1 {
        year -= 1;
        month += 12;
    }
    while month > 12 {
        year += 1;
        month -= 12;
    }
    while day < 1 {
        month -= 1;
        if month < 1 {
            year -= 1;
            month += 12;
        }
        day += days_in_month(year, month);
    }
    while day > days_in_month(year, month) {
        day -= days_in_month(year, month);
        month += 1;
        if month > 12 {
            year += 1;
            month -= 12;
        }
    }
    (year, month, day, hour, minute, second)
}
'''

