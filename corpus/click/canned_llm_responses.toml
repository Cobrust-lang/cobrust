function = "OptionSpec::new"
source_sha16 = "ca9853ad459e787e"
response_text = '''
impl OptionSpec {
    pub fn new(long: impl Into<String>) -> Self {
        let raw = long.into();
        let stripped = raw.trim_start_matches('-').to_string();
        Self {
            name: stripped,
            short: None,
            param_type: ParamType::Str,
            default: None,
            help: None,
            required: false,
        }
    }
}
'''

[[entry]]
task = "translate"
function = "OptionSpec::short"
source_sha16 = "ca9853ad459e787e"
response_text = '''
impl OptionSpec {
    pub fn short(mut self, short: impl Into<String>) -> Self {
        let raw = short.into();
        let stripped = raw.trim_start_matches('-').to_string();
        self.short = Some(format!("-{stripped}"));
        self
    }
}
'''

