fn parse_kv(
    state: &mut State<'_>,
    dest: &mut BTreeMap<String, Value>,
) -> Result<(), TomliError> {
    let key = parse_key(state)?;
    skip_whitespace(state);
    state.expect(b'=')?;
    let value = parse_value(state)?;
    dest.insert(key, value);
    Ok(())
}
'''

