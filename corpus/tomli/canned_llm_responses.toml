[[entry]]
task = "translate"
function = "skip_whitespace"
source_sha16 = "9a1adcc278853b5e"
response_text = '''
fn skip_whitespace(state: &mut State<'_>) {
    while let Some(b) = state.peek() {
        if b == b' ' || b == b'\t' || b == b'\n' || b == b'\r' {
            state.pos += 1;
        } else if b == b'#' {
            while let Some(b2) = state.peek() {
                if b2 == b'\n' {
                    break;
                }
                state.pos += 1;
            }
        } else {
            return;
        }
    }
}
'''
