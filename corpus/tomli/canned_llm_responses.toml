fn parse_literal_string(state: &mut State<'_>) -> Result<String, TomliError> {
    state.expect(b'\'')?;
    let mut out = String::new();
    while let Some(b) = state.advance() {
        if b == b'\'' {
            return Ok(out);
        }
        out.push(char::from(b));
    }
    Err(TomliError::new("unterminated literal string", state.pos))
}
'''

