source_sha16 = "9a1adcc278853b5e"
response_text = '''
fn parse_bool(state: &mut State<'_>) -> Result<bool, TomliError> {
    let rem = &state.src[state.pos..];
    if rem.starts_with("true") {
        state.pos += 4;
        return Ok(true);
    }
    if rem.starts_with("false") {
        state.pos += 5;
        return Ok(false);
    }
    Err(TomliError::new("expected bool", state.pos))
}
'''

