/// Flat row-major identity matrix. Translated from linalg_core._identity.
pub fn identity(n: usize) -> Vec<f64> {
    let mut v = vec![0.0_f64; n * n];
    for i in 0..n { v[i * n + i] = 1.0; }
    v
}
'''

