# Canned LLM responses for numpy M7.4 — synthetic-LLM mode.
#
# Schema per ADR-0007 §"Synthetic-LLM mode contract" + ADR-0008 §5
# (per-attempt routing) + ADR-0017. Lookup key:
# (task, function, attempt). When `attempt` is omitted both sides
# default to 1.
#
# Source-SHA staleness check:
#   sha256(corpus/numpy/M7.4/upstream/linalg_core.py)[..16] = "2e5a978821dffc1e"
#
# These canned responses describe a flat-file equivalent of the
# multi-file cobrust-numpy crate; the pipeline integration test
# (`crates/cobrust-numpy/tests/linalg_pipeline.rs`) drives this corpus
# end-to-end and asserts (a) every function is emitted, (b) every
# function carries a provenance header, and (c) the assembled
# parser.rs string is non-empty per function. The production
# multi-file crate at `crates/cobrust-numpy/src/` is the gate-stable
# byte snapshot; canned responses here cover the **translator path**
# itself.
#
# MODULE PREAMBLE: alphabetically-first function (`cholesky`)
# carries the preamble. Subsequent entries emit only their function
# bodies.

schema_version = 1
oracle_runtime = "cpython 3.11"

