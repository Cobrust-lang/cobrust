source_sha16 = "2c54da26a59f2a56"
response_text = '''
// Module preamble for M7.5 random (synthetic-LLM mode).
// Per ADR-0018 §"Crate layout" the production cobrust-numpy is
// multi-file; the canned-response path emits a flat-file equivalent
// so the M7.5 pipeline integration test can assert end-to-end
// emission without extending the pipeline's hardcoded per-library
// file layout.

#![allow(clippy::cast_lossless)]
#![allow(clippy::cast_possible_truncation)]
#![allow(clippy::cast_possible_wrap)]
#![allow(clippy::cast_precision_loss)]
#![allow(clippy::cast_sign_loss)]
#![allow(clippy::float_cmp)]
#![allow(clippy::similar_names)]
#![allow(clippy::missing_panics_doc)]
#![allow(clippy::must_use_candidate)]
#![allow(clippy::needless_pass_by_value)]
#![allow(clippy::imprecise_flops)]
#![allow(clippy::suboptimal_flops)]
#![allow(clippy::excessive_precision)]
#![allow(dead_code)]

#[derive(Clone, Debug, PartialEq)]
pub struct NumpyError { pub kind: NumpyErrorKind, pub message: String }

#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
pub enum NumpyErrorKind {
    InvalidIntegerRange,
    InvalidDistributionParams,
    InvalidProbabilities,
    EmptyChoicePopulation,
}

/// Box-Muller transform reference. Translated from random_core._box_muller.
pub fn box_muller(u1: f64, u2: f64) -> (f64, f64) {
    let r = (-2.0_f64 * u1.ln()).sqrt();
    let theta = 2.0_f64 * std::f64::consts::PI * u2;
    (r * theta.cos(), r * theta.sin())
}
'''

