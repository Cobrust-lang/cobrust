# ---- validate_probabilities ------------------------------------------------

[[entry]]
task = "translate"
function = "validate_probabilities"
source_sha16 = "2c54da26a59f2a56"
response_text = '''
/// Validate p sums to 1 (rtol 1e-8), no negatives, length matches n.
/// Translated from random_core._validate_probabilities.
pub fn validate_probabilities(p: &[f64], n: usize) -> Result<(), NumpyError> {
    if p.len() != n {
        return Err(NumpyError { kind: NumpyErrorKind::InvalidProbabilities, message: format!("p length {} != values length {}", p.len(), n) });
    }
    let mut s = 0.0_f64;
    for v in p {
        if !v.is_finite() || *v < 0.0 {
            return Err(NumpyError { kind: NumpyErrorKind::InvalidProbabilities, message: format!("p contains invalid value {v}") });
        }
        s += v;
    }
    if (s - 1.0).abs() > 1e-8 {
        return Err(NumpyError { kind: NumpyErrorKind::InvalidProbabilities, message: format!("probabilities do not sum to 1 (sum={s})") });
    }
    Ok(())
}
'''

