# ---- validate_distribution_params -----------------------------------------

[[entry]]
task = "translate"
function = "validate_distribution_params"
source_sha16 = "2c54da26a59f2a56"
response_text = '''
/// Validate scale > 0 / low < high / finite. Translated from
/// random_core._validate_distribution_params.
pub fn validate_distribution_params(scale: Option<f64>, low: Option<f64>, high: Option<f64>) -> Result<(), NumpyError> {
    if let Some(s) = scale {
        if !s.is_finite() || s <= 0.0 {
            return Err(NumpyError { kind: NumpyErrorKind::InvalidDistributionParams, message: format!("scale must be > 0 and finite, got {s}") });
        }
    }
    if let (Some(lo), Some(hi)) = (low, high) {
        if !lo.is_finite() || !hi.is_finite() || lo >= hi {
            return Err(NumpyError { kind: NumpyErrorKind::InvalidDistributionParams, message: format!("low/high invalid: low={lo}, high={hi}") });
        }
    }
    Ok(())
}
'''

