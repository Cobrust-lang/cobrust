# Per-library performance gate override for M7.5 (per ADR-0008 §2 +
# ADR-0010 §3 + ADR-0014 §5 + ADR-0018).
#
# Numerical tier per ADR-0010 §3: 0.5x upper-bound floor. M7.5
# random surface uses rand_pcg::Pcg64 + rand_distr; pure-Rust
# competes against numpy's hand-tuned SIMD random kernels. The
# distribution-level KS-test gate is the primary correctness check
# (per ADR-0018 §5); perf is an additional gate.
#
# Threshold semantics: cobrust-numpy must not be slower than 1/0.5 = 2x
# upstream numpy on any individual random benchmark. Reports persisted
# under target/cobrust-bench/numpy-M7.5/<commit>/.

threshold = 0.5
pass_ratio = 1.0
n_iters = 100
n_inputs = 32

# Notes:
#   - Numerical tier: 0.5x (per ADR-0010 §3).
#   - M7.5 inherits the ENFORCED gate from M7.1..M7.3 (per ADR-0014 §5 + ADR-0015 + ADR-0016).
#   - Real-LLM mode bench: tests/random_bench.rs drives in-process
#     timing harness vs numpy oracle subprocess.
