use ndarray::{ArrayD, IxDyn};

#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
pub enum Dtype {
    Int32,
    Int64,
    Float32,
    Float64,
    Bool,
}

#[derive(Clone, Debug, PartialEq)]
pub struct NumpyError {
    pub kind: NumpyErrorKind,
    pub message: String,
}

#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
pub enum NumpyErrorKind {
    BroadcastShapeMismatch,
    IntegerDivisionByZero,
    TypePromotionFailure,
    ShapeMismatch,
    UnsupportedDtype,
}

#[derive(Clone, Debug, PartialEq)]
pub enum Array {
    Int32(ArrayD<i32>),
    Int64(ArrayD<i64>),
    Float32(ArrayD<f32>),
    Float64(ArrayD<f64>),
    Bool(ArrayD<bool>),
}

pub fn result_type(a: Dtype, b: Dtype) -> Dtype {
    use Dtype::{Bool, Float32, Float64, Int32, Int64};
    match (a, b) {
        (Bool, Bool) => Bool,
        (Bool, Int32) | (Int32, Bool) => Int32,
        (Bool, Int64) | (Int64, Bool) => Int64,
        (Bool, Float32) | (Float32, Bool) => Float32,
        (Bool, Float64) | (Float64, Bool) => Float64,
        (Int32, Int32) => Int32,
        (Int32, Int64) | (Int64, Int32) => Int64,
        (Int32, Float32) | (Float32, Int32) => Float64,
        (Int32, Float64) | (Float64, Int32) => Float64,
        (Int64, Int64) => Int64,
        (Int64, Float32) | (Float32, Int64) => Float64,
        (Int64, Float64) | (Float64, Int64) => Float64,
        (Float32, Float32) => Float32,
        (Float32, Float64) | (Float64, Float32) => Float64,
        (Float64, Float64) => Float64,
    }
}

pub fn broadcast_shape(a: &[usize], b: &[usize]) -> Result<Vec<usize>, NumpyError> {
    let n = a.len().max(b.len());
    let mut out = Vec::with_capacity(n);
    for k in 0..n {
        let a_dim = if k < a.len() { a[a.len() - 1 - k] } else { 1 };
        let b_dim = if k < b.len() { b[b.len() - 1 - k] } else { 1 };
        let dim = if a_dim == b_dim {
            a_dim
        } else if a_dim == 1 {
            b_dim
        } else if b_dim == 1 {
            a_dim
        } else {
            return Err(NumpyError {
                kind: NumpyErrorKind::BroadcastShapeMismatch,
                message: format!("operands could not be broadcast together with shapes {a:?} {b:?}"),
            });
        };
        out.push(dim);
    }
    out.reverse();
    Ok(out)
}

/// Element-wise add (`a + b`). Translated from `ufunc_core.add`.
pub fn add(a: &Array, b: &Array) -> Result<Array, NumpyError> {
    // Stub body: production lives in crates/cobrust-numpy/src/ufunc.rs.
    let _ = (a, b);
    Err(NumpyError { kind: NumpyErrorKind::UnsupportedDtype, message: "synthetic stub".into() })
}
'''

