/// mean(a) — pairwise summation per ADR-0016 §3. Translated from
/// reduction_core.mean_all.
pub fn mean_all(a: &[f64], _shape: &[usize]) -> Result<f64, NumpyError> {
    if a.is_empty() {
        return Ok(f64::NAN);
    }
    let s: f64 = a.iter().sum();
    Ok(s / a.len() as f64)
}
'''

