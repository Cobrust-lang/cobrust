source_sha16 = "091d4078fed10b8a"
response_text = '''
/// Normalise a negative axis index. None → reduce-all. Translated
/// from reduction_core._normalize_axis.
pub fn normalize_axis(axis: Option<i64>, ndim: usize) -> Result<Option<usize>, NumpyError> {
    let Some(mut a) = axis else { return Ok(None); };
    let n = ndim as i64;
    if a < 0 { a += n; }
    if a < 0 || a >= n {
        return Err(NumpyError {
            kind: NumpyErrorKind::IndexError,
            message: format!("axis {axis:?} is out of bounds for array of dimension {ndim}"),
        });
    }
    Ok(Some(a as usize))
}
'''

# ---- pairwise_sum ---------------------------------------------------------

[[entry]]
task = "translate"
function = "pairwise_sum"
source_sha16 = "091d4078fed10b8a"
response_text = '''
/// Pairwise summation per ADR-0016 §3 (chunk size 8). Translated
/// from reduction_core._pairwise_sum.
pub fn pairwise_sum(values: &[f64]) -> f64 {
    let n = values.len();
    if n == 0 { return 0.0; }
    if n <= 8 {
        let mut s = 0.0_f64;
        for v in values { s += *v; }
        return s;
    }
    let mid = n / 2;
    pairwise_sum(&values[..mid]) + pairwise_sum(&values[mid..])
}
'''

