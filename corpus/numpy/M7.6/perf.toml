# Per-library performance gate override for M7.6 (per ADR-0008 §2 +
# ADR-0010 §3 + ADR-0014 §5 + ADR-0021).
#
# Numerical tier per ADR-0010 §3: 0.5x upper-bound floor. M7.6
# expansion combines FFT (rustfft) + polynomial (M7.4 solve reuse) +
# Complex dtype + reduction extensions; competes against numpy's hand-tuned
# SIMD kernels. The differential gate is the primary correctness check
# (per ADR-0021 §12); perf is an additional gate.
#
# Threshold semantics: cobrust-numpy must not be slower than 1/0.5 = 2x
# upstream numpy on any individual benchmark. Reports persisted under
# target/cobrust-bench/numpy-M7.6/<commit>/.

threshold = 0.5
pass_ratio = 1.0
n_iters = 100
n_inputs = 32

# Notes:
#   - Numerical tier: 0.5x (per ADR-0010 §3).
#   - M7.6 inherits the ENFORCED gate from M7.1..M7.5 (per ADR-0014 §5 + ADR-0021).
#   - Real-LLM mode bench: tests/{fft,poly,complex,reduce_extensions}_bench.rs
#     drives in-process timing harness vs numpy oracle subprocess.
