response_text = '''
/// Count elements produced by a normalised slice. Translated from
/// `index_core.slice_count`.
pub fn slice_count(begin: i64, end: i64, step: i64) -> i64 {
    if step > 0 {
        if end <= begin { 0 } else { (end - begin + step - 1) / step }
    } else {
        if end >= begin { 0 } else { (begin - end + (-step) - 1) / (-step) }
    }
}
'''

