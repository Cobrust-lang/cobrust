source_sha16 = "e6b8c37f4ba39b06"
response_text = '''
/// Normalise a negative single-int index to non-negative; error on
/// out-of-bounds. Translated from `index_core.normalize_single`.
pub fn normalize_single(idx: i64, length: i64) -> Result<i64, NumpyError> {
    let norm = if idx < 0 { idx + length } else { idx };
    if norm < 0 || norm >= length {
        return Err(NumpyError {
            kind: NumpyErrorKind::OutOfBoundsIndex,
            message: format!("index {idx} is out of bounds for axis with length {length}"),
        });
    }
    Ok(norm)
}
'''

