/// Map a Python dtype string to the canonical Rust `Dtype` variant.
/// Translated from `array_core.parse_dtype`.
///
/// # Errors
/// `NumpyError::UnsupportedDtype` for any string outside the M7.0
/// closed set per ADR-0013 §3.
pub fn parse_dtype(s: &str) -> Result<Dtype, NumpyError> {
    match s {
        "int32" | "i4" => Ok(Dtype::Int32),
        "int64" | "i8" => Ok(Dtype::Int64),
        "float32" | "f4" => Ok(Dtype::Float32),
        "float64" | "f8" => Ok(Dtype::Float64),
        "bool" | "?" => Ok(Dtype::Bool),
        other => Err(NumpyError {
            kind: NumpyErrorKind::UnsupportedDtype,
            message: format!("unsupported dtype string: {other:?}"),
        }),
    }
}
'''

