/// Cast a Python float to the canonical Rust representation of a
/// `Dtype`. Float32 path uses IEEE 754 single-precision round-trip.
/// Translated from `array_core.cast_to_dtype`.
#[must_use]
pub fn cast_to_dtype(value: f64, dtype: Dtype) -> serde_json::Value {
    match dtype {
        Dtype::Int32 => serde_json::json!(value as i32),
        Dtype::Int64 => serde_json::json!(value as i64),
        Dtype::Float32 => serde_json::json!(value as f32 as f64),
        Dtype::Float64 => serde_json::json!(value),
        Dtype::Bool => serde_json::json!(value != 0.0),
    }
}
'''

