// Module preamble emitted with the first alphabetic function (arange).
// Subsequent entries emit only their function body. Per ADR-0013 §
// "Decision" the production cobrust-numpy is multi-file
// (dtype.rs / error.rs / array.rs / constructors.rs / print.rs);
// the canned-response path emits a flat-file equivalent so the M7.0
