/// numpy-compatible `repr()` per ADR-0013 §4. Translated from
/// `array_core.array_repr`.
#[must_use]
pub fn array_repr(arr: &Array) -> String {
    let dtype_name = match arr {
        Array::Int32(_) => "int32",
        Array::Int64(_) => "int64",
        Array::Float32(_) => "float32",
        Array::Float64(_) => "float64",
        Array::Bool(_) => "bool",
    };
    format!("array(<elided>, dtype={dtype_name})")
}
'''

