use ndarray::{ArrayD, IxDyn};
use std::fmt;

#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
pub enum Dtype {
    Int32,
    Int64,
    Float32,
    Float64,
    Bool,
}

#[derive(Clone, Debug, PartialEq)]
pub struct NumpyError {
    pub kind: NumpyErrorKind,
    pub message: String,
}

#[derive(Clone, Copy, Debug, PartialEq, Eq, Hash)]
pub enum NumpyErrorKind {
    UnsupportedDtype,
    ShapeMismatch,
    NegativeDimension,
    ZeroStep,
    BoolArangeUnsupported,
    CastFailed,
}

impl fmt::Display for NumpyError {
    fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
        write!(f, "NumpyError: {}", self.message)
    }
}

#[derive(Clone, Debug, PartialEq)]
pub enum Array {
    Int32(ArrayD<i32>),
    Int64(ArrayD<i64>),
    Float32(ArrayD<f32>),
    Float64(ArrayD<f64>),
    Bool(ArrayD<bool>),
}

impl Array {
    #[must_use]
    pub fn dtype(&self) -> Dtype {
        match self {
            Self::Int32(_) => Dtype::Int32,
            Self::Int64(_) => Dtype::Int64,
            Self::Float32(_) => Dtype::Float32,
            Self::Float64(_) => Dtype::Float64,
            Self::Bool(_) => Dtype::Bool,
        }
    }
}

/// `numpy.arange(start, stop, step, dtype=...)`-equivalent. Half-open
/// range constructor. Translated from `array_core.arange`.
///
/// # Errors
/// - `NumpyError::ZeroStep` if `step == 0`.
/// - `NumpyError::BoolArangeUnsupported` if `dtype == Dtype::Bool`.
pub fn arange(start: f64, stop: f64, step: f64, dtype: Dtype) -> Result<Array, NumpyError> {
    if step == 0.0 {
        return Err(NumpyError {
            kind: NumpyErrorKind::ZeroStep,
            message: "arange: step must be nonzero".into(),
        });
    }
    if matches!(dtype, Dtype::Bool) {
        return Err(NumpyError {
            kind: NumpyErrorKind::BoolArangeUnsupported,
            message: "arange: dtype=bool not supported".into(),
        });
    }
    let count = arange_count(start, stop, step);
    let raw: Vec<f64> = (0..count).map(|i| start + (i as f64) * step).collect();
    array(&raw, &[count], dtype)
}

#[must_use]
pub fn arange_count(start: f64, stop: f64, step: f64) -> usize {
    if step == 0.0 {
        return 0;
    }
    let delta = stop - start;
    if step > 0.0 && delta <= 0.0 {
        return 0;
    }
    if step < 0.0 && delta >= 0.0 {
        return 0;
    }
    let raw = (delta / step).ceil();
    if raw <= 0.0 {
        0
    } else if raw.is_finite() {
        raw as usize
    } else {
        0
    }
}
'''

