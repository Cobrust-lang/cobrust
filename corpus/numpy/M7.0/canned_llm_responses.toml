/// Compute the flat element count for a shape vector. Helper used
/// by constructors. Translated from `array_core.shape_size`.
#[must_use]
pub fn shape_size(shape: &[usize]) -> usize {
    let mut n: usize = 1;
    for &d in shape {
        n = n.saturating_mul(d);
    }
    n
}
'''

