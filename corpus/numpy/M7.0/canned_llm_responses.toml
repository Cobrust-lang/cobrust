/// `numpy.array(values).reshape(shape).astype(dtype)`-equivalent. Takes
/// a flat `f64` buffer plus shape + dtype. Translated from
/// `array_core.array`.
///
/// # Errors
/// `NumpyError::ShapeMismatch` if `values.len() != shape_size(shape)`.
pub fn array(values: &[f64], shape: &[usize], dtype: Dtype) -> Result<Array, NumpyError> {
    let expected = shape_size(shape);
    if values.len() != expected {
        return Err(NumpyError {
            kind: NumpyErrorKind::ShapeMismatch,
            message: format!(
                "values length {} does not match shape product {} for shape={:?}",
                values.len(),
                expected,
                shape
            ),
        });
    }
    let dim = IxDyn(shape);
    match dtype {
        Dtype::Int32 => {
            let casted: Vec<i32> = values.iter().map(|v| *v as i32).collect();
            ArrayD::<i32>::from_shape_vec(dim, casted)
                .map(Array::Int32)
                .map_err(|e| NumpyError {
                    kind: NumpyErrorKind::ShapeMismatch,
                    message: format!("ndarray from_shape_vec: {e}"),
                })
        }
        Dtype::Int64 => {
            let casted: Vec<i64> = values.iter().map(|v| *v as i64).collect();
            ArrayD::<i64>::from_shape_vec(dim, casted)
                .map(Array::Int64)
                .map_err(|e| NumpyError {
                    kind: NumpyErrorKind::ShapeMismatch,
                    message: format!("ndarray from_shape_vec: {e}"),
                })
        }
        Dtype::Float32 => {
            let casted: Vec<f32> = values.iter().map(|v| *v as f32).collect();
            ArrayD::<f32>::from_shape_vec(dim, casted)
                .map(Array::Float32)
                .map_err(|e| NumpyError {
                    kind: NumpyErrorKind::ShapeMismatch,
                    message: format!("ndarray from_shape_vec: {e}"),
                })
        }
        Dtype::Float64 => ArrayD::<f64>::from_shape_vec(dim, values.to_vec())
            .map(Array::Float64)
            .map_err(|e| NumpyError {
                kind: NumpyErrorKind::ShapeMismatch,
                message: format!("ndarray from_shape_vec: {e}"),
            }),
        Dtype::Bool => {
            let casted: Vec<bool> = values.iter().map(|v| *v != 0.0).collect();
            ArrayD::<bool>::from_shape_vec(dim, casted)
                .map(Array::Bool)
                .map_err(|e| NumpyError {
                    kind: NumpyErrorKind::ShapeMismatch,
                    message: format!("ndarray from_shape_vec: {e}"),
                })
        }
    }
}
'''

