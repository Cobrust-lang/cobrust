impl Session {
    pub fn new() -> Self {
        let inner = reqwest::blocking::Client::builder()
            .timeout(Duration::from_secs(30))
            .build()
            .expect("reqwest blocking client builder is infallible");
        Self { inner }
    }
}
'''

