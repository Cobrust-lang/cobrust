# Synthetic-LLM canned response table for cobrust-requests.
#
# Per ADR-0007 §4 (synthetic-mode contract) + ADR-0022 §5: the
# pipeline routes prompt-hash lookups against this table; cache
# misses raise `synthetic-miss` (caller must add an entry or switch
# to real-LLM via `--features real-llm`).
#
# Lookup key: (task, function, attempt) — per ADR-0008 §5 (M5
# extension) + ADR-0010 §"Synthetic provider — task field extends".
#
# `source_sha16` is the first 16 hex chars of the SHA-256 of the
# upstream subset. If the upstream SHA changes, every entry's
# `source_sha16` mismatches and the synthetic provider returns
# `synthetic-stale` — forcing the curator to re-record.

