// fn:get translated to a thin wrapper around `default_session().get(url)`
// that delegates to reqwest::blocking under the hood. Surface stays
// sync per constitution §2.2.
pub fn get(url: &str) -> Result<Response, HttpError> {
    default_session().get(url)
}
'''

